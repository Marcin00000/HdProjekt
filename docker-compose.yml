services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8000"
      - "5000:5000"
      - "4200:4200"
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONPATH: /app
      PORT: "8000"
      MLFLOW_PORT: "5000"
      MLFLOW_HOST: "0.0.0.0"
      MLFLOW_PUBLIC_URL: http://127.0.0.1:5000
      PREFECT_UI_URL: http://127.0.0.1:4200
      PREFECT_PUBLIC_URL: http://127.0.0.1:4200
      PREFECT_API_URL: http://127.0.0.1:4200/api
      PREFECT_SERVER_ANALYTICS_ENABLED: "false"
      PREFECT_HOME: /app/data/prefect
      API_SKIP_MODEL_LOAD: "0"
    volumes:
      - ./models:/app/models
      - ./data/mlflow:/app/data/mlflow
      - ./data/prefect:/app/data/prefect
      - ./data/processed:/app/data/processed
      - ./reports:/app/reports
      - ./params.yaml:/app/params.yaml:ro
    restart: unless-stopped
